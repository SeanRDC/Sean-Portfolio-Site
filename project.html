<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Project - Sean</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;600&family=Work+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <!-- Place your Favicon links here -->
</head>
<body>
    
    <div id="nav-placeholder"></div>

    <div class="back-nav">
        <a href="work.html" class="back-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            Back to Work
        </a>
    </div>

    <!-- Project Hero -->
    <section class="project-hero">
        <h1 id="hero-title">Loading Project...</h1>
        <p id="hero-subtitle" class="project-subtitle"></p>
        
        <div class="project-meta">
            <div class="meta-item"><div class="meta-label">Role</div><div id="meta-role" class="meta-value"></div></div>
            <div class="meta-item"><div class="meta-label">Year</div><div id="meta-year" class="meta-value"></div></div>
            <div class="meta-item"><div class="meta-label">Platform</div><div id="meta-platform" class="meta-value"></div></div>
        </div>
    </section>

    <div class="project-content">
        
        <!-- Overview Section -->
        <section class="project-section">
            <h2 class="section-heading">Project Overview</h2>
            <div id="overview-content" class="project-description"></div>
        </section>

        <!-- Image Showcase -->
        <section class="project-section">
            <h2 class="section-heading">Visual Design</h2>
            <div id="image-grid" class="image-showcase"></div>
        </section>

        <!-- Image Modal -->
        <div id="imageModal" class="image-modal">
            <span class="modal-close">&times;</span>
            <img class="modal-content" id="modalImage">
            <div class="modal-caption" id="modalCaption"></div>
        </div>

        <!-- Project Links -->
        <div id="project-links-container" class="project-links"></div>

        <!-- Project Details Grid -->
        <section class="project-section">
            <h2 class="section-heading">Project Details</h2>
            <div id="details-grid" class="project-details-grid">
                <!-- JS will inject lists and goals here -->
            </div>
        </section>

        <!-- Key Achievements (Injected dynamically if it exists) -->
        <div id="achievements-container"></div>

        <!-- Next Project Navigation -->
        <section class="project-section" style="text-align: center; padding-top: var(--spacing-lg); border-top: 1px solid var(--color-border);">
            <a href="work.html" class="project-link-btn secondary">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 3h18v18H3z"/>
                    <path d="M9 9h6v6H9z"/>
                </svg>
                View All Projects
            </a>
        </section>
    </div>

    <div id="footer-placeholder"></div>

    <!-- Scripts -->
    <script src="js/projects-data.js"></script>
    <script src="js/project-loader.js"></script>
    <script src="js/script.js"></script> <!-- Your main script for nav/footer and modals -->
</body>
</html>
